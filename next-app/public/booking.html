<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Your Interview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f4f9;
    font-family: 'Google Sans', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #202124;
  }

  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    width: 100%;
    max-width: 860px;
    overflow: hidden;
  }

  /* -- HEADER -- */
  .header {
    background: #1a73e8;
    color: #fff;
    padding: 24px 32px;
  }
  .header .logo { font-size: 0.85rem; opacity: 0.85; margin-bottom: 4px; }
  .header h1 { font-size: 1.4rem; font-weight: 500; }
  .header .candidate-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    background: rgba(255,255,255,0.15);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
  }
  .header .token-badge {
    margin-top: 8px;
    font-size: 0.75rem;
    opacity: 0.85;
    background: rgba(255,255,255,0.15);
    padding: 4px 10px;
    border-radius: 10px;
    display: inline-flex;
    gap: 6px;
    align-items: center;
  }

  /* -- BODY -- */
  .body {
    display: flex;
    min-height: 480px;
  }

  /* -- LEFT: CALENDAR -- */
  .cal-panel {
    width: 320px;
    flex-shrink: 0;
    padding: 24px;
    border-right: 1px solid #e8eaed;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-nav .month-label { font-size: 1rem; font-weight: 500; color: #202124; }
  .cal-nav button {
    background: none;
    border: none;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 1.1rem;
    color: #5f6368;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .cal-nav button:hover { background: #f1f3f4; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-dow {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 600;
    color: #5f6368;
    padding: 4px 0 8px;
    text-transform: uppercase;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    border-radius: 50%;
    cursor: pointer;
    color: #202124;
    transition: background 0.12s, color 0.12s;
    position: relative;
  }
  .cal-day:hover:not(.empty):not(.past) { background: #e8f0fe; color: #1a73e8; }
  .cal-day.has-slots::after {
    content: '';
    position: absolute;
    bottom: 3px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #1a73e8;
  }
  .cal-day.selected { background: #1a73e8 !important; color: #fff !important; }
  .cal-day.selected::after { background: #fff; }
  .cal-day.today { font-weight: 700; color: #1a73e8; }
  .cal-day.today.selected { color: #fff; }
  .cal-day.past { color: #bdc1c6; cursor: default; }
  .cal-day.empty { cursor: default; }

  /* -- RIGHT: TIME SLOTS -- */
  .time-panel {
    flex: 1;
    padding: 24px;
    display: flex;
    flex-direction: column;
  }

  .time-panel .date-heading {
    font-size: 1rem;
    font-weight: 500;
    color: #202124;
    margin-bottom: 16px;
    min-height: 24px;
  }
  .time-panel .date-heading span { color: #1a73e8; }

  .time-slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    flex: 1;
    align-content: start;
    max-height: 340px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .time-slots::-webkit-scrollbar { width: 4px; }
  .time-slots::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }

  .time-btn {
    padding: 10px 6px;
    border: 1.5px solid #dadce0;
    border-radius: 8px;
    background: #fff;
    color: #1a73e8;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
  }
  .time-btn:hover { border-color: #1a73e8; background: #e8f0fe; }
  .time-btn.selected { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .time-btn:disabled { background: #f8f9fa; color: #9aa0a6; border-color: #e0e0e0; cursor: not-allowed; }
  .slot-full-label { display: block; font-size: 0.75rem; color: #c5221f; margin-top: 4px; }

  .no-slots-msg {
    color: #5f6368;
    font-size: 0.9rem;
    text-align: center;
    padding: 40px 20px;
  }
  .pick-date-msg {
    color: #9aa0a6;
    font-size: 0.9rem;
    text-align: center;
    padding: 40px 20px;
  }

  /* -- FOOTER -- */
  .footer {
    padding: 20px 32px;
    border-top: 1px solid #e8eaed;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .selected-summary {
    font-size: 0.88rem;
    color: #5f6368;
    min-height: 20px;
  }
  .selected-summary strong { color: #202124; }

  .book-btn {
    padding: 10px 28px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .book-btn:hover:not(:disabled) { background: #1557b0; }
  .book-btn:disabled { background: #dadce0; color: #9aa0a6; cursor: not-allowed; }

  /* -- STATUS -- */
  .status-bar {
    margin: 0 32px 20px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.88rem;
    display: none;
  }
  .status-bar.success { background: #e6f4ea; color: #137333; display: block; }
  .status-bar.error   { background: #fce8e6; color: #c5221f; display: block; }

  .session-link-box {
    margin: 0 32px 20px;
    padding: 16px;
    border: 1px solid #d2e3fc;
    border-radius: 12px;
    background: #eef4ff;
    display: none;
  }
  .session-link-title {
    font-size: 0.92rem;
    font-weight: 600;
    color: #174ea6;
    margin-bottom: 6px;
  }
  .session-link-text {
    font-size: 0.88rem;
    color: #355a9b;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .session-link-btn {
    display: inline-block;
    padding: 10px 18px;
    background: #1a73e8;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
  }
  .session-link-btn:hover { background: #1557b0; }

  /* -- MANUAL FIELDS (if no name/email in URL) -- */
  .manual-fields {
    padding: 16px 32px 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .manual-fields input {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border: 1.5px solid #dadce0;
    border-radius: 8px;
    font-size: 0.9rem;
    color: #202124;
    outline: none;
    transition: border-color 0.15s;
  }
  .manual-fields input:focus { border-color: #1a73e8; }

  /* -- RECEIVED DETAILS -- */
  .details {
    margin: 12px 32px 0;
    border: 1px solid #e8eaed;
    border-radius: 12px;
    background: #f8fafc;
    padding: 14px 16px;
  }
  .details-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: #202124;
    margin-bottom: 10px;
  }
  .details-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .details-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #5f6368;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .details-pre {
    white-space: pre-wrap;
    background: #fff;
    border: 1px solid #e8eaed;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.82rem;
    color: #202124;
    max-height: 180px;
    overflow: auto;
  }
  @media (max-width: 720px) {
    body { padding: 16px; align-items: flex-start; }
    .container { max-width: 100%; }
    .body { flex-direction: column; }
    .cal-panel { width: 100%; border-right: none; border-bottom: 1px solid #e8eaed; }
    .time-panel { width: 100%; }
    .time-slots { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .candidate-badge { flex-direction: column; align-items: flex-start; gap: 2px; }
    .candidate-badge .badge-sep { display: none; }
    #badgeName, #badgeEmail { display: block; }
  }
  @media (max-width: 820px) {
    .details-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Pontis AI Interviews</div>
    <h1>Schedule Your Interview</h1>
    <div class="candidate-badge" id="candidateBadge" style="display:none">
      <span>Candidate</span>
      <span id="badgeName"></span>
      <span class="badge-sep" style="opacity:0.6">&middot;</span>
      <span id="badgeEmail" style="opacity:0.85"></span>
    </div>
  </div>

  <!-- MANUAL FIELDS (shown only if name/email not in URL) -->
  <div class="manual-fields" id="manualFields">
    <input type="text"  id="nameInput"  placeholder="Your full name" />
    <input type="email" id="emailInput" placeholder="Your email address" />
  </div>


  <!-- BODY -->
  <div class="body">

    <!-- CALENDAR -->
    <div class="cal-panel">
      <div class="cal-nav">
        <button id="prevMonth">&#8249;</button>
        <span class="month-label" id="monthLabel"></span>
        <button id="nextMonth">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- TIME SLOTS -->
    <div class="time-panel">
      <div class="date-heading" id="dateHeading">
        <span style="color:#9aa0a6">Select a date to see available times</span>
      </div>
      <div class="time-slots" id="timeSlots">
        <div class="pick-date-msg" style="grid-column:1/-1">Pick a date on the calendar</div>
      </div>
    </div>

  </div>

  <!-- STATUS -->
  <div class="status-bar" id="statusBar"></div>
  <div class="session-link-box" id="sessionLinkBox">
    <div class="session-link-title">Interview already scheduled</div>
    <div class="session-link-text" id="sessionLinkText"></div>
    <a class="session-link-btn" id="sessionLinkBtn" href="/interview">Open Interview</a>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="selected-summary" id="selectedSummary">No slot selected</div>
    <button class="book-btn" id="bookBtn" disabled>Confirm Booking</button>
  </div>

</div>
<script>
const p = new URLSearchParams(window.location.search);
const bookingToken = (p.get("token") || "").trim();
const sessionToken = (p.get("session") || p.get("sessionToken") || "").trim();
const cfg = {
  name:          p.get("candidateName") || p.get("name")         || "",
  email:         p.get("email")                                   || "",
  resume:        p.get("resume")                                  || "",
  jobDescription:p.get("jobDescription") || p.get("jd")          || "",
  jobRole:       p.get("jobRole")                                 || "",
  agencyId:      p.get("agencyId")       || p.get("agency_id")   || "",
  userId:        p.get("userId")         || p.get("user_id")     || "",
  jobId:         p.get("jobId")          || p.get("job_id")      || "",
  candidateId:   p.get("candidateId")    || p.get("candidate_id")|| "",
  interviewQuestions: [],
};

function localDateStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

let slotsByDate  = {};
let selectedDate = null;
let selectedSlot = null;
let viewYear     = new Date().getFullYear();
let viewMonth    = new Date().getMonth();
let serverTodayStr = localDateStr(new Date());
let serverNowIso = null;
let serverNowMinutes = null;
let bookingLocked = false;

const DAYS   = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const MONTHS = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];
function pickDeep(obj, keys) {
  if (!obj || typeof obj !== "object") return "";
  const normalized = keys.map(k => k.toLowerCase().replace(/[^a-z0-9]/g, ""));

  function walk(node) {
    if (!node || typeof node !== "object") return "";
    for (const [k, v] of Object.entries(node)) {
      const nk = k.toLowerCase().replace(/[^a-z0-9]/g, "");
      if (normalized.includes(nk) && v != null && String(v).trim() !== "") {
        return v;
      }
    }
    for (const value of Object.values(node)) {
      const found = walk(value);
      if (found) return found;
    }
    return "";
  }

  return walk(obj);
}

async function init() {
  const linkState = await hydrateLinkDetails();
  if (linkState.kind === "session") {
    lockBookingUi();
  }

  if (cfg.name && cfg.email) {
    document.getElementById("manualFields").style.display = "none";
    document.getElementById("candidateBadge").style.display = "inline-flex";
    document.getElementById("badgeName").textContent  = cfg.name;
    document.getElementById("badgeEmail").textContent = cfg.email;
  } else {
    if (cfg.name)  document.getElementById("nameInput").value  = cfg.name;
    if (cfg.email) document.getElementById("emailInput").value = cfg.email;
  }

  await loadSlots();
}

async function hydrateLinkDetails() {
  if (bookingToken) {
    const ok = await hydrateFromBookingToken(bookingToken, {
      allowQueryFallback: hasPrefilledIdentity(),
    });
    return ok ? { kind: "booking-token" } : { kind: "invalid" };
  }

  if (sessionToken) {
    const sessionData = await hydrateFromSessionToken(sessionToken);
    if (sessionData) {
      return { kind: "session", data: sessionData };
    }

    const legacyBookingTokenResolved = await hydrateFromBookingToken(sessionToken, { silent: true });
    if (legacyBookingTokenResolved) {
      return { kind: "legacy-booking-token" };
    }

    if (!hasPrefilledIdentity()) {
      showStatus("This booking link is invalid or has already been used.", "error");
    }
    return { kind: "invalid" };
  }

  if (!hasPrefilledIdentity()) {
    showStatus("Missing booking token in the link.", "error");
  }
  return { kind: "missing" };
}

function hasPrefilledIdentity() {
  return !!(cfg.name && cfg.email);
}

async function hydrateFromBookingToken(rawToken, { silent = false, allowQueryFallback = false } = {}) {
  try {
    const res  = await fetch(`/api/booking-token/${encodeURIComponent(rawToken)}`);
    const data = await res.json();
    if (!data.success) {
      if (!silent && !allowQueryFallback) showStatus(data.error || "Invalid booking link", "error");
      return false;
    }

    cfg.name = data.name || pickDeep(data, ["candidateName", "candidate_name", "name", "fullName", "full_name"]) || cfg.name;
    cfg.email = data.email || pickDeep(data, ["email", "candidateEmail", "candidate_email", "mail"]) || cfg.email;
    cfg.resume = data.resume_text || cfg.resume;
    cfg.jobDescription = data.job_description || cfg.jobDescription;
    cfg.jobRole = data.job_title || cfg.jobRole;
    cfg.agencyId = data.agency_id || cfg.agencyId;
    cfg.candidateId = data.candidate_id || cfg.candidateId;
    cfg.jobId = data.job_id || cfg.jobId;
    cfg.userId = data.user_id || cfg.userId;
    cfg.interviewQuestions = data.interview_questions || data.async_questions || data.asyncQuestions || [];

    if (data.already_booked && data.session_token) {
      const slotText = data.slot_date && data.slot_time
        ? `Your interview is already booked for ${data.slot_date} at ${data.slot_time}.`
        : "Your interview has already been booked.";
      showStatus(slotText, "success");
      showSessionLink(data.session_token, slotText);
      lockBookingUi();
    }

    return true;
  } catch (e) {
    if (!silent && !allowQueryFallback) showStatus("Failed to load booking details", "error");
    return false;
  }
}

async function hydrateFromSessionToken(rawSessionToken) {
  try {
    const res = await fetch(`/api/session-info/${encodeURIComponent(rawSessionToken)}`);
    const data = await res.json();
    if (!data.success) return null;

    cfg.name = data.name || pickDeep(data, ["candidateName", "candidate_name", "name", "fullName", "full_name"]) || cfg.name;
    cfg.email = data.email || pickDeep(data, ["email", "candidateEmail", "candidate_email", "mail"]) || cfg.email;
    cfg.resume = data.resume_text || cfg.resume;
    cfg.jobDescription = data.job_description || cfg.jobDescription;
    cfg.jobRole = data.job_title || cfg.jobRole;
    cfg.agencyId = data.agency_id || cfg.agencyId;
    cfg.candidateId = data.candidate_id || cfg.candidateId;
    cfg.jobId = data.job_id || cfg.jobId;
    cfg.userId = data.user_id || cfg.userId;
    cfg.interviewQuestions = data.interview_questions || [];

    const slotText = data.slot_date && data.slot_time
      ? `Your interview is already booked for ${data.slot_date} at ${data.slot_time}.`
      : "Your interview has already been booked.";
    showStatus(slotText, "success");
    showSessionLink(rawSessionToken, slotText);
    return data;
  } catch (e) {
    return null;
  }
}

function lockBookingUi() {
  bookingLocked = true;
  selectedSlot = null;
  document.getElementById("bookBtn").disabled = true;
  document.getElementById("bookBtn").textContent = "Already Booked";
  document.getElementById("selectedSummary").textContent = "This interview already has a scheduled session.";
}

function showSessionLink(tokenValue, text) {
  const box = document.getElementById("sessionLinkBox");
  const textEl = document.getElementById("sessionLinkText");
  const linkEl = document.getElementById("sessionLinkBtn");
  textEl.textContent = text;
  linkEl.href = `/interview?session=${encodeURIComponent(tokenValue)}`;
  box.style.display = "block";
}

async function loadSlots() {
  try {
    const res  = await fetch("/api/available-slots");
    const data = await res.json();
    if (!data.success) throw new Error(data.error || "Failed to load slots");
    const serverNow = data.server_now_iso ? new Date(data.server_now_iso) : new Date();
    serverNowIso = serverNow.toISOString();
    serverNowMinutes = serverNow.getHours() * 60 + serverNow.getMinutes();
    serverTodayStr = data.server_date || localDateStr(serverNow);

    slotsByDate = {};
    for (const s of data.slots) {
      if (!slotsByDate[s.slot_date]) slotsByDate[s.slot_date] = [];
      slotsByDate[s.slot_date].push(s);
    }
    renderCalendar();
    if (slotsByDate[serverTodayStr]) selectDate(serverTodayStr);
  } catch (e) {
    showStatus("Failed to load slots: " + e.message, "error");
  }
}

function renderCalendar() {
  document.getElementById("monthLabel").textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";

  DAYS.forEach(d => {
    const el = document.createElement("div");
    el.className = "cal-dow";
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement("div");
    el.className = "cal-day empty";
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const mm      = String(viewMonth + 1).padStart(2, "0");
    const dd      = String(d).padStart(2, "0");
    const dateStr = `${viewYear}-${mm}-${dd}`;

    const el       = document.createElement("div");
    el.className   = "cal-day";
    el.textContent = d;

    const isPast   = dateStr < serverTodayStr;
    const isToday  = dateStr === serverTodayStr;
    const hasSlots = !!slotsByDate[dateStr];

    if (isPast)               el.classList.add("past");
    if (isToday)              el.classList.add("today");
    if (hasSlots)             el.classList.add("has-slots");
    if (dateStr === selectedDate) el.classList.add("selected");

    if (!isPast && hasSlots) {
      el.addEventListener("click", () => selectDate(dateStr));
    }
    grid.appendChild(el);
  }
}

function selectDate(dateStr) {
  if (bookingLocked) return;
  selectedDate = dateStr;
  selectedSlot = null;
  document.getElementById("bookBtn").disabled = true;
  updateSummary();
  renderCalendar();
  renderTimeSlots(dateStr);
}

function renderTimeSlots(dateStr) {
  let slots       = slotsByDate[dateStr] || [];
  const heading   = document.getElementById("dateHeading");
  const container = document.getElementById("timeSlots");
  const isToday   = dateStr === serverTodayStr;

  if (isToday && serverNowMinutes !== null) {
    slots = slots.filter(slot => {
      const [h, m] = slot.slot_time.split(":").map(Number);
      return (h * 60 + m) > serverNowMinutes;
    });
  }

  const d = new Date(dateStr + "T00:00:00");
  heading.innerHTML = `<span>${d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</span>`;

  if (!slots.length) {
    const msg = isToday ? "No remaining slots today" : "No available slots on this date";
    container.innerHTML = `<div class="no-slots-msg" style="grid-column:1/-1">${msg}</div>`;
    return;
  }

  container.innerHTML = "";
  slots.forEach(slot => {
    const btn       = document.createElement("button");
    btn.className   = "time-btn";
    const isFull    = typeof slot.available === "number" && slot.available <= 0;
    btn.innerHTML   = `<div>${formatTime(slot.slot_time)}</div>`;
    if (isFull) {
      btn.disabled = true;
      btn.innerHTML += `<div class="slot-full-label">Slot full. Choose another slot</div>`;
    }
    if (selectedSlot && selectedSlot.slot_id === slot.slot_id) btn.classList.add("selected");
    if (!isFull) {
      btn.addEventListener("click", () => selectSlot(slot, btn));
    }
    container.appendChild(btn);
  });
}

function selectSlot(slot, btnEl) {
  if (bookingLocked) return;
  selectedSlot = slot;
  document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("selected"));
  btnEl.classList.add("selected");
  document.getElementById("bookBtn").disabled = false;
  updateSummary();
}

function updateSummary() {
  const el = document.getElementById("selectedSummary");
  if (selectedSlot) {
    const d = new Date(selectedSlot.slot_date + "T00:00:00");
    el.innerHTML = `<strong>${d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</strong> at <strong>${formatTime(selectedSlot.slot_time)}</strong>`;
  } else {
    el.textContent = "No slot selected";
  }
}

document.getElementById("bookBtn").addEventListener("click", async () => {
  if (bookingLocked) return;
  const name  = cfg.name  || document.getElementById("nameInput")?.value.trim();
  const email = cfg.email || document.getElementById("emailInput")?.value.trim();
  if (!name || !email)  { showStatus("Please enter your name and email.", "error"); return; }
  if (!selectedSlot)    { showStatus("Please select a time slot.", "error"); return; }

  const btn = document.getElementById("bookBtn");
  btn.disabled = true;
  btn.textContent = "Booking...";

  try {
    const res  = await fetch("/api/book-slot", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        slot_id: selectedSlot.slot_id, name, email,
        bookingToken: bookingToken || sessionToken || "",
        interviewQuestions: cfg.interviewQuestions || [],
        resume: cfg.resume, jobDescription: cfg.jobDescription,
        jobRole: cfg.jobRole, agencyId: cfg.agencyId,
        userId: cfg.userId, jobId: cfg.jobId, candidateId: cfg.candidateId,
      }),
    });
    const data = await res.json();
    if (data.success) {
      showStatus(`Interview booked for ${data.slot_date} at ${data.slot_time}. Check your email for confirmation.`, "success");
      btn.textContent = "Booked";
    } else {
      showStatus(data.error || "Booking failed", "error");
      btn.disabled = false;
      btn.textContent = "Confirm Booking";
    }
  } catch (e) {
    showStatus("Network error. Please try again.", "error");
    btn.disabled = false;
    btn.textContent = "Confirm Booking";
  }
});

document.getElementById("prevMonth").addEventListener("click", () => {
  viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
});
document.getElementById("nextMonth").addEventListener("click", () => {
  viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
});

function formatTime(t) {
  const [h, m] = t.split(":");
  const hour = parseInt(h);
  return `${hour > 12 ? hour - 12 : hour || 12}:${m} ${hour >= 12 ? "PM" : "AM"}`;
}

function showStatus(msg, type) {
  const el = document.getElementById("statusBar");
  el.textContent = msg;
  el.className   = "status-bar " + type;
  el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

if (!bookingToken && !sessionToken) {
  document.body.innerHTML = `
    <div style="max-width:720px;margin:64px auto;padding:32px;border-radius:16px;
                background:#fff;box-shadow:0 6px 30px rgba(0,0,0,0.12);font-family:Arial,sans-serif;">
      <h1 style="margin-bottom:12px;font-size:22px;color:#1a73e8;">Invalid or missing booking link</h1>
      <p style="margin-bottom:12px;color:#4a5568;">This page requires a valid booking link token. Please open the latest booking link sent to your email.</p>
      <p style="color:#6b7280;">If you believe this is an error, request a fresh booking link from your recruiter.</p>
    </div>`;
} else {
  init();
}
</script>
</body>
</html>
